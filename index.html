<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aspect-grid-collageify v2 demo</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(79, 70, 229, 0.28), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.18), transparent 30rem),
        #020617;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.78);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 0.25rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .badge {
      border: 1px solid rgba(99, 102, 241, 0.35);
      background: rgba(99, 102, 241, 0.12);
      color: #c7d2fe;
      border-radius: 999px;
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      min-height: 0;
      overflow: hidden;
    }

    .stage {
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 1rem;
      padding: 1.25rem;
      min-width: 0;
      min-height: 0;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      color: #94a3b8;
      font-size: 0.82rem;
    }

    .canvas-shell {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 1.25rem;
      background:
        linear-gradient(45deg, rgba(30, 41, 59, 0.65) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(30, 41, 59, 0.65) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(30, 41, 59, 0.65) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(30, 41, 59, 0.65) 75%);
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
    }

    canvas {
      width: min(60vh, 100%);
      aspect-ratio: 3 / 4;
      max-height: 100%;
      border-radius: 1rem;
      outline: none;
      background: #fff;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    canvas.transparent-bg {
      background: transparent;
    }

    aside {
      min-height: 0;
      overflow: auto;
      border-left: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(15, 23, 42, 0.82);
      padding: 1.25rem;
    }

    .panel {
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 1rem;
      padding: 1rem;
      background: rgba(2, 6, 23, 0.46);
      margin-bottom: 1rem;
    }

    .panel h2 {
      margin: 0 0 0.85rem;
      font-size: 0.92rem;
    }

    .field {
      display: grid;
      gap: 0.45rem;
      margin-bottom: 0.85rem;
    }

    label {
      color: #94a3b8;
      font-size: 0.78rem;
    }

    select,
    input[type="number"],
    input[type="color"],
    input[type="checkbox"] {
      width: 100%;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 0.7rem;
      background: #0f172a;
      color: #e2e8f0;
      padding: 0.62rem 0.7rem;
    }

    input[type="checkbox"] {
      width: auto;
      accent-color: #6366f1;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #6366f1;
    }

    .row,
    .compact-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .compact-row .field,
    .compact-row .check-field {
      margin-bottom: 0.7rem;
    }

    .check-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 0.7rem;
      background: rgba(15, 23, 42, 0.7);
      padding: 0.62rem 0.7rem;
      min-height: 40px;
    }

    .check-field label {
      color: #e2e8f0;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .action-hint {
      margin: -0.25rem 0 0.8rem;
      color: #94a3b8;
      font-size: 0.72rem;
      line-height: 1.45;
    }

    button {
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 0.75rem;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
      color: #e2e8f0;
      padding: 0.68rem 0.8rem;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: transform 0.15s ease, border-color 0.15s ease, filter 0.15s ease, box-shadow 0.15s ease;
    }

    button.primary {
      background: linear-gradient(135deg, #4f46e5, #2563eb);
      border-color: rgba(199, 210, 254, 0.28);
      box-shadow: 0 10px 24px rgba(79, 70, 229, 0.22);
    }

    button.danger {
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.24);
      background: linear-gradient(180deg, rgba(127, 29, 29, 0.42), rgba(15, 23, 42, 0.95));
    }

    button.secondary {
      color: #c7d2fe;
      border-color: rgba(129, 140, 248, 0.24);
    }

    button:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.22);
    }

    .image-list {
      display: grid;
      gap: 0.55rem;
      max-height: 260px;
      overflow: auto;
      padding-right: 0.25rem;
    }

    .image-item {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: 0.75rem;
      padding: 0.65rem;
      background: rgba(15, 23, 42, 0.72);
      font-size: 0.8rem;
    }

    .muted {
      color: #94a3b8;
    }

    code {
      color: #c7d2fe;
    }

    @media (max-width: 920px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        border-left: 0;
        border-top: 1px solid rgba(148, 163, 184, 0.16);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>aspect-grid-collageify <span class="badge">v2 Core / Editor</span></h1>
        <div class="subtitle">Core 负责最终拼图；Editor 只负责可视化编辑覆盖层和输入事件。</div>
      </div>
      <div class="badge" id="status">Ready</div>
    </header>

    <main>
      <section class="stage">
        <div class="canvas-shell">
          <canvas id="collage-canvas"></canvas>
        </div>
        <div class="footer">
          <span>图片数：<code id="image-count">0</code></span>
          <span>选区：<code id="selection-label">-</code></span>
        </div>
      </section>

      <aside>
        <div class="panel">
          <h2>Core options</h2>
          <div class="compact-row">
            <div class="field">
              <label for="container-ratio">容器比例</label>
              <select id="container-ratio">
                <option value="3:4">3:4</option>
                <option value="1:1">1:1</option>
                <option value="4:3">4:3</option>
                <option value="16:9">16:9</option>
                <option value="9:16">9:16</option>
              </select>
            </div>
            <div class="field">
              <label for="image-ratio">图片比例</label>
              <select id="image-ratio">
                <option value="16:9">16:9</option>
                <option value="4:3">4:3</option>
                <option value="1:1">1:1</option>
                <option value="3:2">3:2</option>
              </select>
            </div>
          </div>

          <div class="compact-row">
            <div class="field">
              <label for="padding-2k">Padding：<code id="padding-value">60</code></label>
              <input id="padding-2k" type="range" min="0" max="180" step="5" value="60">
            </div>
            <div class="field">
              <label for="gap-2k">Gap：<code id="gap-value">24</code></label>
              <input id="gap-2k" type="range" min="0" max="80" step="2" value="24">
            </div>
          </div>

          <div class="compact-row">
            <div class="field">
              <label for="bg-color">背景色</label>
              <input id="bg-color" type="color" value="#ffffff">
            </div>
            <div class="check-field">
              <label for="transparent-bg">背景透明</label>
              <input id="transparent-bg" type="checkbox">
            </div>
          </div>

          <div class="compact-row">
            <div class="field">
              <label for="placement-preset">插入预设</label>
              <select id="placement-preset">
                <option value="small">small</option>
                <option value="medium" selected>medium</option>
                <option value="large">large</option>
              </select>
            </div>
            <div class="field">
              <label for="grid-columns">网格列数：<code id="grid-columns-value">8</code></label>
              <input id="grid-columns" type="range" min="4" max="48" step="2" value="8">
            </div>
          </div>

          <div class="compact-row">
            <div class="field">
              <label for="border-radius-2k">图片圆角：<code id="border-radius-value">24</code></label>
              <input id="border-radius-2k" type="range" min="0" max="120" step="2" value="24">
            </div>
            <div class="field">
              <label for="shadow-blur-2k">阴影模糊：<code id="shadow-blur-value">0</code></label>
              <input id="shadow-blur-2k" type="range" min="0" max="120" step="2" value="0">
            </div>
          </div>
          <div class="compact-row">
            <div class="field">
              <label for="shadow-offset-2k">阴影偏移：<code id="shadow-offset-value">0</code></label>
              <input id="shadow-offset-2k" type="range" min="0" max="80" step="2" value="0">
            </div>
            <div class="field">
              <label for="shadow-opacity">阴影透明：<code id="shadow-opacity-value">0.2</code></label>
              <input id="shadow-opacity" type="range" min="0" max="1" step="0.05" value="0.2">
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>Editor actions</h2>
          <p class="action-hint">拖入图片到画布插入；Ctrl/Cmd + 单击多选；方向键移动；Ctrl/Cmd + 上下调整尺寸；Delete 删除。</p>
          <div class="actions">
            <button class="primary" id="pick-files">插入图片</button>
            <button class="secondary" id="replace-active">替换选中</button>
            <button class="danger" id="delete-selection">删除选区</button>
            <button class="secondary" id="clear-selection">清空选区</button>
            <button class="secondary" id="export-png">导出 PNG</button>
          </div>
          <input id="file-input" type="file" accept="image/*" multiple hidden>
          <input id="replace-input" type="file" accept="image/*" hidden>
        </div>

        <div class="panel">
          <h2>Images from Core</h2>
          <div class="image-list" id="image-list"></div>
        </div>
      </aside>
    </main>
  </div>

  <script type="module">
    import { CollageCore, CanvasCollageEditor } from "./dist/index.mjs";

    const canvas = document.getElementById("collage-canvas");
    const status = document.getElementById("status");
    const imageCount = document.getElementById("image-count");
    const selectionLabel = document.getElementById("selection-label");
    const imageList = document.getElementById("image-list");
    const fileInput = document.getElementById("file-input");
    const replaceInput = document.getElementById("replace-input");

    const core = new CollageCore({
      containerRatio: "3:4",
      imageRatio: "16:9",
      gridColumns: 8,
      padding2K: 60,
      gap2K: 24,
      background: {
        color: "#ffffff",
        transparent: false,
      },
      imageStyle: {
        borderRadius2K: 24,
        shadowBlur2K: 0,
        shadowOffset2K: 0,
        shadowOpacity: 0.2,
      },
      images: [],
      placementPreset: "medium",
    });

    const editor = new CanvasCollageEditor(canvas, core, {
      multiSelect: true,
      keyboard: true,
      dragMove: true,
      dragSwap: true,
      dragInsert: true,
      quickReplace: true,
      overlay: {
        showBoundary: true,
        showGridlines: true,
        showSlots: true,
        slotText: "插入图片",
      },
    });

    editor.on("change", renderState);
    editor.on("selectionchange", renderState);
    editor.on("activechange", renderState);
    editor.on("cellclick", (placement) => {
      editor.setPendingInsertPlacement(placement);
      fileInput.click();
    });
    editor.on("replacerequest", () => replaceInput.click());
    editor.on("error", (error) => {
      console.error(error);
      setStatus("Error");
    });

    document.getElementById("pick-files").addEventListener("click", () => {
      editor.setPendingInsertPlacement(null);
      fileInput.click();
    });
    document.getElementById("replace-active").addEventListener("click", () => replaceInput.click());
    document.getElementById("delete-selection").addEventListener("click", () => {
      if (core.removeImages(editor.getSelection())) editor.clearSelection();
    });
    document.getElementById("clear-selection").addEventListener("click", () => editor.clearSelection());
    document.getElementById("export-png").addEventListener("click", exportPng);

    fileInput.addEventListener("change", async () => {
      await editor.insertFiles(fileInput.files || []);
      fileInput.value = "";
    });

    replaceInput.addEventListener("change", async () => {
      const file = replaceInput.files?.[0];
      if (file) await editor.replaceActiveFile(file);
      replaceInput.value = "";
    });

    bindOption("container-ratio", (value) => ({ containerRatio: value }));
    bindOption("image-ratio", (value) => ({ imageRatio: value }));
    bindOption("placement-preset", (value) => ({ placementPreset: value }));
    bindOption("bg-color", (value) => ({ background: { color: value, transparent: core.getOptions().background?.transparent || false } }));
    bindCheckboxOption("transparent-bg", (checked) => ({ background: { ...core.getOptions().background, transparent: checked } }), syncCanvasBackground);
    bindNumberOption("grid-columns", "grid-columns-value", (value) => ({ gridColumns: value }));
    bindNumberOption("padding-2k", "padding-value", (value) => ({ padding2K: value }));
    bindNumberOption("gap-2k", "gap-value", (value) => ({ gap2K: value }));
    bindNumberOption("border-radius-2k", "border-radius-value", (value) => ({ imageStyle: { ...core.getOptions().imageStyle, borderRadius2K: value } }));
    bindNumberOption("shadow-blur-2k", "shadow-blur-value", (value) => ({ imageStyle: { ...core.getOptions().imageStyle, shadowBlur2K: value } }));
    bindNumberOption("shadow-offset-2k", "shadow-offset-value", (value) => ({ imageStyle: { ...core.getOptions().imageStyle, shadowOffset2K: value } }));
    bindNumberOption("shadow-opacity", "shadow-opacity-value", (value) => ({ imageStyle: { ...core.getOptions().imageStyle, shadowOpacity: value } }));

    window.addEventListener("resize", updateCanvasRatio);
    syncCanvasBackground();
    updateCanvasRatio();
    renderState();

    function bindOption(id, toOptions) {
      document.getElementById(id).addEventListener("input", (event) => {
        core.updateOptions(toOptions(event.target.value));
        updateCanvasRatio();
      });
    }

    function bindNumberOption(id, valueId, toOptions) {
      const input = document.getElementById(id);
      const label = document.getElementById(valueId);
      input.addEventListener("input", () => {
        const value = Number(input.value);
        label.textContent = String(value);
        core.updateOptions(toOptions(value));
      });
    }

    function bindCheckboxOption(id, toOptions, afterChange) {
      const input = document.getElementById(id);
      input.addEventListener("change", () => {
        core.updateOptions(toOptions(input.checked));
        afterChange?.();
      });
    }

    function syncCanvasBackground() {
      canvas.classList.toggle("transparent-bg", !!core.getOptions().background?.transparent);
    }

    function updateCanvasRatio() {
      const ratio = core.getOptions().containerRatio;
      const [w, h] = ratio.split(":").map(Number);
      if (!Number.isFinite(w) || !Number.isFinite(h) || w <= 0 || h <= 0) {
        editor.resize();
        return;
      }

      const shell = canvas.parentElement;
      const shellRect = shell?.getBoundingClientRect();
      const maxWidth = Math.max(240, (shellRect?.width || 0) - 32);
      const maxHeight = Math.max(240, (shellRect?.height || 0) - 32);
      const ratioValue = w / h;
      const widthByHeight = maxHeight * ratioValue;
      const canvasWidth = Math.min(maxWidth, widthByHeight);
      const canvasHeight = canvasWidth / ratioValue;

      canvas.style.width = `${canvasWidth}px`;
      canvas.style.height = `${canvasHeight}px`;
      canvas.style.aspectRatio = `${w} / ${h}`;
      editor.resize();
    }

    function renderState() {
      const images = core.getImages();
      const selection = editor.getSelection();
      imageCount.textContent = String(images.length);
      selectionLabel.textContent = selection.length ? selection.join(", ") : "-";
      imageList.innerHTML = images.length
        ? images.map((image) => `
          <div class="image-item">
            <div>
              <strong>${escapeHtml(image.name)}</strong>
              <div class="muted">${image.gridX}, ${image.gridY} · span ${image.span}</div>
            </div>
            <button data-select="${image.id}">选中</button>
          </div>
        `).join("")
        : '<div class="muted">暂无图片。点击占位格或拖入文件。</div>';

      imageList.querySelectorAll("[data-select]").forEach((button) => {
        button.addEventListener("click", () => editor.setActiveId(button.dataset.select));
      });
    }

    async function exportPng() {
      setStatus("Exporting...");
      const dataUrl = await core.exportPNG(2048);
      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = "collage.png";
      link.click();
      setStatus("Ready");
    }

    function setStatus(text) {
      status.textContent = text;
    }

    function escapeHtml(value) {
      return value.replace(/[&<>'"]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;",
      }[char]));
    }
  </script>
</body>
</html>
